name: Monitor stock zonakids

on:
  workflow_dispatch: # disparado por el cron externo (cron-job.org) vía API; tambien sirve el boton manual en Actions

permissions:
  contents: write # necesario para commitear state.json

concurrency:
  group: monitor-stock
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Revisar stock
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node check.js

      - name: Guardar estado
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "stock-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "Sin cambios de estado."
          fi
